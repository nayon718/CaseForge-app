name: Build CaseForge APK (Ultimate)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Save custom files
        run: |
          mkdir -p _backup
          cp lib/main.dart _backup/ 2>/dev/null || true
          cp pubspec.yaml _backup/ 2>/dev/null || true

      - name: Generate Flutter project
        run: |
          flutter create . --project-name caseforge --org com.caseforge --overwrite

      - name: Restore custom files
        run: |
          cp _backup/main.dart lib/ 2>/dev/null || true
          cp _backup/pubspec.yaml . 2>/dev/null || true
          rm -rf _backup

      - name: Add all dependencies
        run: |
          flutter pub add webview_flutter
          flutter pub add url_launcher
          flutter pub add flutter_local_notifications
          flutter pub add permission_handler
          flutter pub add vibration
          flutter pub add audioplayers
          flutter pub add cupertino_icons

      - name: Add ALL Permissions to AndroidManifest
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <!-- Internet -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />

              <!-- External Apps -->
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />

              <!-- Notifications -->
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />

              <!-- Sound/Audio -->
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />

              <!-- Storage -->
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />

              <!-- Camera -->
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-feature android:name="android.hardware.camera" android:required="false" />

              <!-- Location -->
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />

              <!-- Phone -->
              <uses-permission android:name="android.permission.READ_PHONE_STATE" />
              <uses-permission android:name="android.permission.CALL_PHONE" />

              <!-- Biometric -->
              <uses-permission android:name="android.permission.USE_BIOMETRIC" />
              <uses-permission android:name="android.permission.USE_FINGERPRINT" />

              <application
                  android:label="CaseForge"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true"
                  android:allowBackup="true"
                  android:fullBackupContent="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <!-- Notification Receivers -->
                  <receiver android:exported="false" android:name="com.dexterous.flutterlocalnotifications.ActionBroadcastReceiver" />
                  <receiver android:exported="false" android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationReceiver" />

                  <service
                      android:name="com.dexterous.flutterlocalnotifications.ForegroundService"
                      android:exported="false"
                      android:stopWithTask="false" />

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Enable ProGuard & Shrink for smaller APK
        run: |
          cat > android/app/build.gradle << 'EOF'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) {
              throw new GradleException("Flutter SDK not found.")
          }

          def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
          if (flutterVersionCode == null) {
              flutterVersionCode = '1'
          }

          def flutterVersionName = localProperties.getProperty('flutter.versionName')
          if (flutterVersionName == null) {
              flutterVersionName = '1.0'
          }

          apply plugin: 'com.android.application'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

          android {
              namespace "com.caseforge.app"
              compileSdkVersion flutter.compileSdkVersion
              ndkVersion flutter.ndkVersion

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              defaultConfig {
                  applicationId "com.caseforge.app"
                  minSdkVersion 21
                  targetSdkVersion flutter.targetSdkVersion
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
                  multiDexEnabled true
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }

          flutter {
              source '../..'
          }

          dependencies {}
          EOF

      - name: Add ProGuard rules
        run: |
          cat > android/app/proguard-rules.pro << 'EOF'
          # Flutter
          -keep class io.flutter.app.** { *; }
          -keep class io.flutter.plugin.** { *; }
          -keep class io.flutter.util.** { *; }
          -keep class io.flutter.view.** { *; }
          -keep class io.flutter.** { *; }
          -keep class io.flutter.plugins.** { *; }
          -dontwarn io.flutter.embedding.**

          # WebView
          -keep class android.webkit.** { *; }
          -keep class androidx.webkit.** { *; }

          # URL Launcher
          -keep class io.flutter.plugins.urllauncher.** { *; }

          # Local Notifications
          -keep class com.dexterous.flutterlocalnotifications.** { *; }

          # Permission Handler
          -keep class com.baseflow.permissionhandler.** { *; }

          # Vibration
          -keep class com.benjaminabel.vibration.** { *; }

          # Audio Players
          -keep class xyz.luan.audioplayers.** { *; }

          # General
          -keepattributes *Annotation*
          -keepattributes Signature
          -keepattributes Exceptions
          -keepattributes InnerClasses
          -keepattributes EnclosingMethod
          -dontwarn java.lang.invoke.**
          -dontwarn org.jetbrains.annotations.**
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build Release APK (Split ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: CaseForge-Ultimate-APK
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
